
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

.stage{
  background:#0e0e12;
  border-radius:14px;
  padding:3rem 2.5rem;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:0.1em;
  overflow:hidden;
  position:relative;
}

/* Luz ambiente no fundo */
.stage::before{
  content:'';position:absolute;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(120,60,255,0.12) 0%,transparent 70%);
  top:-50px;left:-50px;pointer-events:none;
}

.line{
  font-family:'Anton',sans-serif;
  font-size:clamp(4rem,14vw,9rem);
  line-height:0.92;
  letter-spacing:0.02em;
  display:block;
  position:relative;
}

/* ── AIR — roxo com relevo ── */
.air{
  background: linear-gradient(
    160deg,
    #c084ff 0%,
    #a855f7 30%,
    #7c3aed 60%,
    #5b21b6 100%
  );
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  filter: drop-shadow(0 0 0 transparent);
  text-shadow: none;
  position:relative;
}

/* Pseudo para o relevo — usa o mesmo texto por cima com shadows */
.air-relief{
  position:absolute;
  inset:0;
  font-family:'Anton',sans-serif;
  font-size:inherit;
  line-height:inherit;
  letter-spacing:inherit;
  color:transparent;
  -webkit-text-stroke:0px transparent;
  text-shadow:
    /* highlight topo — luz vindo de cima */
    0px -3px 0px rgba(220,180,255,0.9),
    0px -2px 0px rgba(200,150,255,0.7),
    /* profundidade — vai escurecendo */
    1px  1px 0px #4c1d95,
    2px  2px 0px #3b1578,
    3px  3px 0px #2e1060,
    4px  4px 0px #21094a,
    5px  5px 0px #160638,
    6px  6px 0px #0f0428,
    /* sombra suave no final */
    7px  9px 12px rgba(0,0,0,0.7),
    8px 10px 20px rgba(80,0,180,0.4);
  pointer-events:none;
}

/* ── MAX — branco com relevo pesado ── */
.max-relief{
  position:absolute;
  inset:0;
  font-family:'Anton',sans-serif;
  font-size:inherit;
  line-height:inherit;
  letter-spacing:inherit;
  color:transparent;
  text-shadow:
    /* highlight topo brilhante */
    0px -3px 0px rgba(255,255,255,1),
    0px -2px 0px rgba(255,255,255,0.8),
    /* profundidade cinza escurecendo */
    1px  1px 0px #b0b0c0,
    2px  2px 0px #9090a8,
    3px  3px 0px #6e6e88,
    4px  4px 0px #545468,
    5px  5px 0px #3e3e50,
    6px  6px 0px #2c2c3e,
    7px  7px 0px #1e1e2e,
    8px  8px 0px #14141e,
    /* sombra final */
    9px 12px 14px rgba(0,0,0,0.8),
    10px 14px 24px rgba(0,0,0,0.5);
  pointer-events:none;
}

.max{
  background:linear-gradient(
    170deg,
    #ffffff 0%,
    #e8e8f0 25%,
    #c8c8e0 55%,
    #a0a0c0 100%
  );
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Brilho de luz diagonal nas letras */
.shine{
  position:absolute;inset:0;
  font-family:'Anton',sans-serif;
  font-size:inherit;line-height:inherit;letter-spacing:inherit;
  background:linear-gradient(
    125deg,
    transparent 30%,
    rgba(255,255,255,0.15) 48%,
    rgba(255,255,255,0.25) 52%,
    transparent 70%
  );
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  pointer-events:none;
  animation:shineMove 4s ease-in-out infinite;
}
@keyframes shineMove{
  0%,100%{background-position:-200% 0}
  50%{background-position:200% 0}
}

.controls{
  padding:1rem 1rem 0.5rem;
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}
input[type=text]{
  flex:1;max-width:220px;padding:8px 14px;border-radius:8px;
  border:0.5px solid var(--color-border-secondary);
  background:var(--color-background-primary);
  color:var(--color-text-primary);
  font-size:14px;font-family:var(--font-sans);
}
.row{
  display:flex;gap:12px;justify-content:center;
  padding:0 1rem 1rem;align-items:center;flex-wrap:wrap;
}
.row label{font-size:12px;color:var(--color-text-secondary)}
.color-pick{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary)}
input[type=color]{width:26px;height:26px;border:none;background:none;cursor:pointer;padding:0;border-radius:50%}
</style>

<div class="stage" id="stage">
  <div class="line">
    <span class="air"  id="l1">AIR</span>
    <span class="air-relief"  id="l1r">AIR</span>
    <span class="shine" id="l1s">AIR</span>
  </div>
  <div class="line">
    <span class="max"  id="l2">MAX</span>
    <span class="max-relief"  id="l2r">MAX</span>
    <span class="shine" id="l2s">MAX</span>
  </div>
</div>

<div class="controls">
  <input type="text" id="i1" placeholder="Linha 1" maxlength="8" value="AIR">
  <input type="text" id="i2" placeholder="Linha 2" maxlength="8" value="MAX">
</div>

<div class="row">
  <div class="color-pick">
    <span>Cor 1</span>
    <input type="color" id="c1" value="#a855f7">
  </div>
  <div class="color-pick">
    <span>Cor 2</span>
    <input type="color" id="c2" value="#ffffff">
  </div>
  <div class="color-pick">
    <span>Fundo</span>
    <input type="color" id="cbg" value="#0e0e12">
  </div>
  <label>Profundidade</label>
  <input type="range" min="3" max="14" value="8" id="dep" style="width:100px">
</div>

<script>
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function darken({r,g,b},factor){
  return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
}

function buildRelief(hexColor, depth){
  const rgb = hexToRgb(hexColor);
  const {r,g,b} = rgb;
  const lighter = `rgba(${Math.min(255,r+120)},${Math.min(255,g+120)},${Math.min(255,b+120)},0.9)`;
  const lighter2= `rgba(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)},0.6)`;
  
  let shadows = `0px -3px 0px ${lighter}, 0px -2px 0px ${lighter2},`;
  
  const steps = Math.min(depth, 12);
  for(let i=1;i<=steps;i++){
    const f = Math.max(0, 1 - (i/steps)*0.85);
    shadows += `${i}px ${i}px 0px ${darken(rgb, f)}`;
    if(i<steps) shadows += ',';
  }
  shadows += `, ${steps+1}px ${steps+3}px ${steps+4}px rgba(0,0,0,0.75)`;
  shadows += `, ${steps+2}px ${steps+5}px ${steps*3}px rgba(0,0,0,0.4)`;
  return shadows;
}

function updateGradient(el, hex){
  const {r,g,b} = hexToRgb(hex);
  const light = `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
  const dark  = `rgb(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)})`;
  el.style.background = `linear-gradient(160deg,${light} 0%,${hex} 40%,${dark} 100%)`;
  el.style.webkitBackgroundClip='text';
  el.style.backgroundClip='text';
  el.style.webkitTextFillColor='transparent';
}

function refresh(){
  const d  = +document.getElementById('dep').value;
  const c1 = document.getElementById('c1').value;
  const c2 = document.getElementById('c2').value;
  const bg = document.getElementById('cbg').value;

  document.getElementById('stage').style.background = bg;

  document.getElementById('l1r').style.textShadow = buildRelief(c1, d);
  document.getElementById('l2r').style.textShadow = buildRelief(c2, d);

  updateGradient(document.getElementById('l1'), c1);
  updateGradient(document.getElementById('l2'), c2);
}

['i1','i2'].forEach((id,i) => {
  document.getElementById(id).addEventListener('input', e => {
    const v = e.target.value.toUpperCase()||'TEXT';
    const suffix = ['','r','s'];
    suffix.forEach(s => {
      const el = document.getElementById('l'+(i+1)+s);
      if(el) el.textContent = v;
    });
  });
});

['c1','c2','cbg','dep'].forEach(id =>
  document.getElementById(id).addEventListener('input', refresh)
);

refresh();
</script>
